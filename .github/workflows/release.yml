name: Release

# Push a version tag (e.g. v0.1.0) → build + pack → GitHub Release with the
# .mcpb + single-file bundles attached, so users can "install from file".
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run pack
      - name: Create release + attach bundle artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            bundle/xrpname-mcp.mcpb \
            bundle/xrpname-mcp.cjs \
            bundle/xrpname-mcp-http.cjs \
            --title "XRPName MCP ${{ github.ref_name }}" \
            --generate-notes
